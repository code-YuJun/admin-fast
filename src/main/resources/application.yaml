# 项目相关配置
fast:
  # 文件存储路径：上传文件保存的目录，默认file目录
  profile: ./file

# spring配置
spring:
  # 数据源(数据库)配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/fast?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: root
    password: 2594131385

# 环境配置
server:
  port: 8080
  servlet:
    # 应用访问路径，根路径，访问地址 localhost:8080/
    context-path: /

# 日志配置
logging:
  level:
    com.fast: debug
    org.springframework: warn

# Mybatis 配置
# 操作数据库的框架, 能简化数据库操作
mybatis:
  # 告诉mybatis 去哪里找数据库接口对应的实体类（别名包扫描）
  type-aliases-package: com.fast.**.domain
  # 配置 mapper 的扫描，告诉mybatis 去哪里找SQL映射文件（XML文件）
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  # 配置 mybatis 的日志
  configuration:
    # 能看到 mybatis 执行的 SQL 语句
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl